services:
  dunena:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    image: dunena/server:local
    env_file:
      - ./env/.env.${DUNENA_ENV:-dev}
    environment:
      # Uncomment to enable optional features:
      # DUNENA_REDIS_ENABLED: "true"
      # DUNENA_OTEL_ENABLED: "true"
      # DUNENA_OTEL_ENDPOINT: "http://otel-collector:4318"
      # DUNENA_CLUSTER_ENABLED: "true"
      # DUNENA_CLUSTER_NODE_ID: "node-1"
      # DUNENA_CLUSTER_SEEDS: ""
      # DUNENA_CLUSTER_PRIORITY: "100"
    ports:
      - "3000:3000"
      # Uncomment to expose Redis protocol port:
      # - "6379:6379"
    volumes:
      - dunena-data:/var/lib/dunena
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  dunena-data:
