services:
  dunena:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    image: dunena/server:local
    env_file:
      - ./env/.env.${DUNENA_ENV:-dev}
    ports:
      - "3000:3000"
    volumes:
      - dunena-data:/var/lib/dunena
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  dunena-data:
