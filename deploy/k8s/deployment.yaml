apiVersion: apps/v1
kind: Deployment
metadata:
  name: dunena
  namespace: dunena
spec:
  # ⚠️  SQLite is a single-writer database.  Running more than one replica
  #    against the same PVC WILL corrupt the database file.
  #    Only increase replicas if you switch to a networked database.
  replicas: 1
  strategy:
    type: Recreate          # Prevent overlapping pods during rollouts
  selector:
    matchLabels:
      app: dunena
  template:
    metadata:
      labels:
        app: dunena
    spec:
      containers:
        - name: dunena
          image: ghcr.io/your-org/dunena:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: dunena-config
            - secretRef:
                name: dunena-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: dunena-data
              mountPath: /var/lib/dunena
      volumes:
        - name: dunena-data
          persistentVolumeClaim:
            claimName: dunena-pvc
