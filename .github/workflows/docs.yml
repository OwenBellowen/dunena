name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "packages/platform/docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCS_WORKDIR: apps/docs
      DOCS_OUTPUT_DIR: apps/docs/out

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.DOCS_WORKDIR }}

      - name: Build Nextra docs
        run: npm run build
        working-directory: ${{ env.DOCS_WORKDIR }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DOCS_OUTPUT_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
