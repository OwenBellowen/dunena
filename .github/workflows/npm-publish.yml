name: NPM Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for npm registry auth)
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      # Note: We do NOT need setup-zig here.
      # The published `@dunena/cli` equivalent via `bunx dunena` is pure HTTP TypeScript.
      # `publish:dunena` only runs `bun build` on the TypeScript entrypoint.
      
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Publish to NPM
      - name: Build and Publish Package
        run: bun run publish:dunena
