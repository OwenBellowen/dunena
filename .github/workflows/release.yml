name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate
        run: |
          bun run check
          bun run test:all

      - name: Build release artifacts
        run: |
          bun run build:zig
          bun run --cwd apps/server build
          bun run --cwd apps/cli build
          mkdir -p release
          cp -r zig/zig-out release/zig-out
          cp -r apps/server/dist release/server
          cp -r apps/cli/dist release/cli
          cp README.md release/
          cp package.json release/
          tar -czf dunena-${GITHUB_REF_NAME}.tar.gz release

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dunena-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
