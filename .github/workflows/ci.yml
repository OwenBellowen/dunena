name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── Fast lint / type-check (no Zig needed) ──────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run check

  # ── Full build + test suite ─────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.15.2

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            zig/.zig-cache
            zig/zig-out
          key: zig-${{ runner.os }}-${{ hashFiles('zig/src/**', 'zig/build.zig', 'zig/build.zig.zon') }}
          restore-keys: zig-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build native modules
        run: bun run build:zig

      - name: Run full test suite
        run: bun run test:all

      - name: Build server bundle
        run: bun run --cwd apps/server build

      - name: Build CLI bundle
        run: bun run --cwd apps/cli build
